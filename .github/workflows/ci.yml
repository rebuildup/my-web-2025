name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun x biome check .
      - run: bun x biome format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun x tsc --noEmit --skipLibCheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      - name: Prepare standalone deployment
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d ".next/standalone/public" ] || cp -r public .next/standalone/public
          [ -d ".next/standalone/data" ] || cp -r data .next/standalone/data
          tar -czf deployment-standalone.tar.gz \
            -C .next/standalone \
            server.js \
            .next \
            public \
            data \
            node_modules \
            package.json

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.GCP_HOST }}
            User ${{ secrets.GCP_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Transfer deployment package
        run: scp deployment-standalone.tar.gz deploy-server:/home/${{ secrets.GCP_USER }}/deployment-standalone.tar.gz

      - name: Deploy on server
        run: |
          ssh deploy-server 'bash -s' << 'REMOTE'
          set -euo pipefail

          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          [ -n "${NVM_BIN:-}" ] && export PATH="$NVM_BIN:$PATH"

          command -v bun >/dev/null 2>&1 || { echo "bun not found"; exit 1; }
          command -v pm2 >/dev/null 2>&1 || { echo "pm2 not found"; exit 1; }

          APP_DIR="/var/www/yusuke-kim"
          PACKAGE_PATH="$HOME/deployment-standalone.tar.gz"
          TMP_DIR="$(mktemp -d)"

          pm2 delete yusuke-kim 2>/dev/null || true
          mkdir -p "$APP_DIR"
          find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$PACKAGE_PATH" -C "$TMP_DIR"
          cp -a "$TMP_DIR"/. "$APP_DIR"/
          rm -rf "$TMP_DIR"
          rm -f "$PACKAGE_PATH"

          cat > "$APP_DIR/.env.production.local" << ENV_EOF
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
          NODE_ENV=production
          PORT=3000
          ENV_EOF

          cd "$APP_DIR"
          pm2 start "$(command -v bun)" --name yusuke-kim -- server.js
          pm2 save
          sleep 10
          curl -fsS http://127.0.0.1:3000/api/health
          REMOTE

      - name: Verify deployment
        run: |
          ssh deploy-server 'bash -s' << 'REMOTE'
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          [ -n "${NVM_BIN:-}" ] && export PATH="$NVM_BIN:$PATH"
          pm2 status
          curl -fsS http://127.0.0.1:3000/api/health
          REMOTE