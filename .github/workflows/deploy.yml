name: Bun Build, Static Export and Server Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Static Export with Rust CMS API
    runs-on: ubuntu-latest
    timeout-minutes: 25

    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run verification checks
        run: |
          bun run type-check
          bun run lint
          bun run test

      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', 'public/**/*', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CMS_USE_RUST_API: "1"
        run: bun run build

      - name: Package static export bundle
        run: tar -czf deployment-static.tar.gz -C out .

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Rust CMS API Backend
        run: |
          cd apps/cms-api
          cargo build --release --manifest-path Cargo.toml
          tar -czf cms-api-binary.tar.gz -C target/release cms-api

      - name: Setup SSH Config
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.GCP_HOST }}
            User ${{ secrets.GCP_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Transfer deployment packages to server
        run: |
          scp deployment-static.tar.gz deploy-server:/home/${{ secrets.GCP_USER }}/deployment-static.tar.gz
          scp apps/cms-api/cms-api-binary.tar.gz deploy-server:/home/${{ secrets.GCP_USER }}/cms-api-binary.tar.gz

      - name: Execute Server Deployment & Nginx Setup
        run: |
          ssh deploy-server 'bash -s' << 'REMOTE'
          set -euo pipefail

          APP_DIR="/var/www/yusuke-kim"
          PACKAGE_PATH="$HOME/deployment-static.tar.gz"
          CMS_API_PATH="$HOME/cms-api-binary.tar.gz"
          DB_BACKUP_DIR="$HOME/cms-db-backup"

          export CMS_API_HOST=127.0.0.1
          export CMS_API_PORT=3001
          export CMS_API_BASE_URL=http://127.0.0.1:3001
          export CMS_USE_RUST_API=1
          export CMS_API_DATA_DIR="$APP_DIR/data/db"

          command -v pm2 >/dev/null 2>&1 || { echo "pm2 not found"; exit 1; }

          # Preserve CMS SQLite Database across deployments
          rm -rf "$DB_BACKUP_DIR"
          if [ -d "$APP_DIR/data/db" ] && [ -n "$(ls -A "$APP_DIR/data/db" 2>/dev/null || true)" ]; then
            mkdir -p "$DB_BACKUP_DIR"
            cp -a "$APP_DIR/data/db/." "$DB_BACKUP_DIR/"
            echo "Backed up CMS DB to $DB_BACKUP_DIR"
          fi

          # Stop old PM2 processes
          pm2 delete yusuke-kim 2>/dev/null || true
          pm2 delete cms-api 2>/dev/null || true

          mkdir -p "$APP_DIR/out"
          mkdir -p "$APP_DIR/apps/cms-api/target/release"
          mkdir -p "$APP_DIR/data/db"

          # Update static export files
          find "$APP_DIR/out" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$PACKAGE_PATH" -C "$APP_DIR/out"
          tar -xzf "$CMS_API_PATH" -C "$APP_DIR/apps/cms-api/target/release/"

          # Restore preserved CMS DB
          if [ -d "$DB_BACKUP_DIR" ] && [ -n "$(ls -A "$DB_BACKUP_DIR" 2>/dev/null || true)" ]; then
            cp -a "$DB_BACKUP_DIR/." "$APP_DIR/data/db/"
            echo "Restored CMS DB from backup"
          fi

          rm -f "$PACKAGE_PATH"
          rm -f "$CMS_API_PATH"
          rm -rf "$DB_BACKUP_DIR"

          chmod +x "$APP_DIR/apps/cms-api/target/release/cms-api"

          # Write PM2 ecosystem file for Rust CMS API
          cat > "$APP_DIR/ecosystem.config.js" << 'ECOSYSTEM_EOF'
          module.exports = {
            apps: [
              {
                name: 'cms-api',
                script: '/var/www/yusuke-kim/apps/cms-api/target/release/cms-api',
                cwd: '/var/www/yusuke-kim',
                env: {
                  RUST_LOG: 'info',
                  CMS_API_DATA_DIR: '/var/www/yusuke-kim/data/db',
                  CMS_API_HOST: '127.0.0.1',
                  CMS_API_PORT: '3001'
                },
                max_memory_restart: '200M',
                restart_delay: 5000,
                max_restarts: 10,
                min_uptime: '10s'
              }
            ]
          };
          ECOSYSTEM_EOF

          # Configure Nginx for Static Export + Rust CMS API Proxy if supported
          NGINX_CONF="/etc/nginx/sites-available/yusuke-kim"
          if [ -d "/etc/nginx/sites-available" ] && sudo -n true 2>/dev/null; then
            sudo tee "$NGINX_CONF" > /dev/null << 'NGINX_EOF'
          server {
              listen 80;
              server_name yusuke-kim.com *.yusuke-kim.com _;

              root /var/www/yusuke-kim/out;
              index index.html;

              access_log /var/log/nginx/yusuke-kim-access.log;
              error_log /var/log/nginx/yusuke-kim-error.log;

              client_max_body_size 50M;

              location / {
                  try_files $uri $uri.html $uri/ /index.html =404;
              }

              location /_next/static/ {
                  expires 1y;
                  add_header Cache-Control "public, max-age=31536000, immutable";
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location ~ ^/(entries|markdown|media|tags|search|preview|health) {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          NGINX_EOF
            sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/yusuke-kim
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx || echo "Nginx reload warning"
          fi

          # Start PM2 processes
          cd "$APP_DIR"
          pm2 start ecosystem.config.js
          pm2 save

          # Verification 1: Rust CMS API Health Check
          RUST_HEALTH_OK=0
          for attempt in {1..10}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null 2>&1; then
              RUST_HEALTH_OK=1
              break
            fi
            sleep 2
          done

          if [ "$RUST_HEALTH_OK" -ne 1 ]; then
            echo "Health check failed for Rust CMS API"
            pm2 status
            pm2 logs cms-api --lines 80 --nostream
            exit 1
          fi

          # Verification 2: Static Export Nginx Response Check
          STATIC_HEALTH_OK=0
          for attempt in {1..5}; do
            if curl -fsS http://127.0.0.1:80/ >/dev/null 2>&1 || [ -f "$APP_DIR/out/index.html" ]; then
              STATIC_HEALTH_OK=1
              break
            fi
            sleep 2
          done

          if [ "$STATIC_HEALTH_OK" -ne 1 ]; then
            echo "Static site verification failed"
            exit 1
          fi

          echo "Static export and Rust backend deployed successfully!"
          exit 0
          REMOTE
