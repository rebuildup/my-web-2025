services:
  cms-api:
    image: my-web-2025-cms-api:latest
    pull_policy: never
    ports:
      - "${CMS_API_PORT:-3001}:3001"
    environment:
      CMS_API_HOST: "0.0.0.0"
      CMS_API_PORT: "3001"
      CMS_API_DATA_DIR: "/app/data/db"
    volumes:
      - ./apps/cms-api:/app/apps/cms-api
      - ./data:/app/data
      - cms-api-target:/app/apps/cms-api/target
      - cms-api-cargo-registry:/usr/local/cargo/registry
    working_dir: /app/apps/cms-api
    command: cargo run

volumes:
  cms-api-target:
  cms-api-cargo-registry:
